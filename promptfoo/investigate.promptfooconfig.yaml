description: "Analytics Investigate evals for /analytics/investigate (tool-grounded)"

providers:
  - id: http
    config:
      url: "http://localhost:8000/analytics/investigate"
      method: POST
      headers:
        Content-Type: application/json
      body:
        question: "{{question}}"
        week_start: "{{week_start}}"
        by:
          - campaign
        n: "{{n}}"
        data_dir: "{{data_dir}}"

defaultTest:
  assert:
    - type: is-json
    - type: javascript
      value: file://assertions/investigateShape.js
    - type: javascript
      value: file://assertions/toolRunsNonEmpty.js
    - type: javascript
      value: file://assertions/groundedNumbersFromTools.js

tests:
  - vars:
      question: "Why did CAC rise last week? Identify the top drivers."
      week_start: "2026-03-16"
      by: ["campaign"]
      n: 5
      data_dir: "data"